<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣與時間</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 60px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #a0c4ff;
        }
        .time {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .date {
            font-size: 1.2rem;
            color: #8ecae6;
            margin-bottom: 40px;
        }
        .weather {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px 40px;
            border-radius: 15px;
        }
        .weather-icon {
            font-size: 3rem;
        }
        .weather-info {
            text-align: left;
        }
        .weather-location {
            font-size: 1.3rem;
            color: #ffd700;
            margin-bottom: 5px;
        }
        .weather-temp {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .weather-desc {
            font-size: 1rem;
            color: #a0c4ff;
        }
        .weather-details {
            font-size: 0.9rem;
            color: #8ecae6;
            margin-top: 5px;
        }
        input {
            margin-top: 30px;
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            outline: none;
            width: 200px;
            text-align: center;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        button {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: #e94560;
            color: #fff;
            cursor:: transform 0 pointer;
            transition.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤️ 天氣與時間</h1>
        <div class="time" id="time">--:--:--</div>
        <div class="date" id="date">載入中...</div>
        
        <div class="weather">
            <div class="weather-icon" id="weatherIcon">🌧️</div>
            <div class="weather-info">
                <div class="weather-location" id="location">臺北</div>
                <div class="weather-temp" id="temp">20°C</div>
                <div class="weather-desc" id="desc">Light rain</div>
                <div class="weather-details" id="details">💧 濕度 94% | 🌬️ 東風</div>
            </div>
        </div>

        <input type="text" id="cityInput" placeholder="輸入城市名稱">
        <br>
        <button onclick="updateWeather()">更新天氣</button>
    </div>

    <script>
        // 時間更新
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-TW', options);
        }
        
        setInterval(updateTime, 1000);
        updateTime();

        // 天氣圖示映射
        function getWeatherIcon(code) {
            const iconMap = {
                '113': '☀️', // Sunny
                '116': '⛅', // Partly cloudy
                '119': '☁️', // Cloudy
                '122': '☁️', // Overcast
                '176': '🌧️', // Patchy rain
                '179': '🌨️', // Patchy snow
                '182': '🌨️', // Patchy sleet
                '185': '🌨️', // Patchy freezing fog
                '200': '⛈️', // Thundery outbreaks
                '227': '🌨️', // Blowing snow
                '230': '❄️', // Blizzard
                '248': '🌫️', // Fog
                '260': '🌫️', // Freezing fog
                '263': '🌧️', // Patchy light drizzle
                '266': '🌧️', // Light drizzle
                '281': '🌨️', // Freezing drizzle
                '284': '🌨️', // Heavy freezing drizzle
                '293': '🌧️', // Patchy light rain
                '296': '🌧️', // Light rain
                '299': '🌧️', // Moderate rain
                '302': '🌧️', // Heavy rain
                '305': '🌧️', // Heavy rain
                '308': '⛈️', // Torrential rain
                '311': '🌧️', // Light freezing rain
                '314': '🌧️', // Moderate/freezing rain
                '317': '🌨️', // Light sleet
                '320': '🌨️', // Moderate/heavy sleet
                '323': '🌨️', // Patchy light snow
                '326': '🌨️', // Light snow
                '329': '❄️', // Moderate snow
                '332': '❄️', // Heavy snow
                '335': '❄️', // Patchy heavy snow
                '338': '❄️', // Heavy snow
                '350': '🌨️', // Ice pellets
                '353': '🌧️', // Light rain shower
                '356': '🌧️', // Moderate/heavy rain shower
                '359': '🌧️', // Torrential rain shower
                '362': '🌨️', // Light sleet showers
                '365': '🌨️', // Moderate/heavy sleet showers
                '368': '🌨️', // Light snow showers
                '371': '❄️', // Heavy snow showers
                '377': '🌨️', // Thundery outbreaks
                '389': '⛈️', // Moderate/heavy rain with thunder
                '394': '⛈️'  // Light snow with thunder
            };
            return iconMap[code] || '🌤️';
        }

        // 天氣更新
        async function updateWeather() {
            const city = document.getElementById('cityInput').value || '臺北';
            try {
                const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
                const data = await response.json();
                const current = data.current_condition[0];
                
                document.getElementById('location').textContent = data.nearest_area[0].areaName[0].value;
                document.getElementById('temp').textContent = `${current.temp_C}°C`;
                document.getElementById('desc').textContent = current.weatherDesc[0].value;
                document.getElementById('weatherIcon').textContent = getWeatherIcon(current.weatherCode);
                document.getElementById('details').textContent = 
                    `💧 濕度 ${current.humidity}% | 🌬️ ${current.windspeedKM}km/h`;
            } catch (e) {
                alert('無法獲取天氣資料，請檢查城市名稱');
            }
        }

        // Enter 鍵觸發
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') updateWeather();
        });
    </script>
</body>
</html>
